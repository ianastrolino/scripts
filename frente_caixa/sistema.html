<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Vistorias — Sistema</title>
  <link rel="icon" type="image/png" href="/assets/img/astro-a.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/design-system.css">
  <link rel="stylesheet" href="/assets/app-shell.css">
  <style>
    .card {
      margin-bottom: var(--ds-space-4);
      padding: var(--ds-space-4);
      background: var(--ds-surface-alt);
      border: 1px solid var(--ds-line);
      border-radius: var(--ds-radius-lg);
    }
    .card-label {
      font-size: var(--ds-text-xs);
      color: var(--ds-ink-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .action-btn {
      flex: 0 1 auto;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--ds-radius-md);
      text-decoration: none; cursor: pointer;
      font-family: inherit;
      font-size: var(--ds-text-sm); font-weight: 600;
      line-height: 1; white-space: nowrap;
      background: var(--ds-surface);
      border: 1px solid var(--ds-line);
      color: var(--ds-ink);
    }
    .action-btn:hover { background: var(--ds-surface-alt); border-color: var(--ds-line-strong); }
    .action-btn:disabled { opacity: .6; cursor: not-allowed; }
    .action-btn .ab-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; flex-shrink: 0; }
    .action-btn .ab-icon svg { width: 18px; height: 18px; }
    .action-btn.danger {
      background: var(--ds-danger-soft);
      border-color: #fecaca;
      color: var(--ds-danger);
    }
    .action-btn.danger:hover { background: #fee2e2; }
  </style>
</head>
<body>

<div id="app-shell"></div>

<main id="app-main">
  <div class="app-content">
    <div class="app-content-wrap">
      <div class="app-page-header">
        <div class="app-page-eyebrow">Sistema</div>
        <h1 class="app-page-title">Sistema da Rede</h1>
        <p class="app-page-sub">Manutenção, backup, infraestrutura.</p>
      </div>

      <!-- Modo Manutenção -->
      <div class="card" style="display:flex;gap:var(--ds-space-3);flex-wrap:wrap;align-items:center">
        <div style="flex:1;min-width:220px">
          <div class="card-label">Modo manutenção</div>
          <div id="maintStatus" style="font-size:var(--ds-text-sm);color:var(--ds-ink);margin-top:2px">carregando...</div>
        </div>
        <button id="maintToggle" class="action-btn">
          <span class="ab-icon" id="maintIcon"></span><span id="maintLabel">...</span>
        </button>
        <button id="smtpTest" class="action-btn">
          <span class="ab-icon" id="smtpIcon"></span>Testar e-mail
        </button>
        <a id="backupDl" href="/gerencial/api/backup/download" class="action-btn">
          <span class="ab-icon" id="backupIcon"></span>Baixar backup
        </a>
      </div>

      <!-- Backup Automático -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--ds-space-3);margin-bottom:var(--ds-space-3)">
          <div>
            <div class="card-label">Backup automático</div>
            <div id="backupSummary" style="font-size:var(--ds-text-sm);color:var(--ds-ink);margin-top:2px">carregando…</div>
          </div>
          <div style="display:flex;gap:var(--ds-space-2);flex-wrap:wrap">
            <a id="backupFolder" class="action-btn" href="#" target="_blank" rel="noopener" style="display:none">
              <span class="ab-icon" id="folderIcon"></span>Abrir painel B2
            </a>
            <button id="backupTestRestore" class="action-btn" title="Baixa o ultimo ZIP do B2 e valida que e restauravel">
              Testar restore
            </button>
            <button id="backupNow" class="action-btn">
              <span class="ab-icon" id="backupNowIcon"></span>Fazer backup agora
            </button>
          </div>
        </div>
        <div id="backupHistory" style="font-size:var(--ds-text-xs);color:var(--ds-ink-muted)"></div>
      </div>

    </div>
  </div>
</main>

<script src="/assets/app-shell.js"></script>
<script>
  AstroShell.init({
    active: "sistema",
    breadcrumbs: [
      { label: "Sistema" },
      { label: "Sistema da Rede", current: true }
    ]
  });

  let _csrfToken = "";
  async function getCsrf() {
    if (_csrfToken) return _csrfToken;
    try {
      const r = await fetch("/api/csrf-token");
      const j = await r.json();
      _csrfToken = j.token || "";
    } catch { _csrfToken = ""; }
    return _csrfToken;
  }

  document.getElementById("smtpIcon").innerHTML = AstroShell.icon("send");
  document.getElementById("backupIcon").innerHTML = AstroShell.icon("download");
  document.getElementById("backupNowIcon").innerHTML = AstroShell.icon("save");
  document.getElementById("folderIcon").innerHTML = AstroShell.icon("folder");

  function _fmtBr(iso){
    if(!iso) return "—";
    try{
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yy = d.getFullYear();
      const hh = String(d.getHours()).padStart(2,"0");
      const mi = String(d.getMinutes()).padStart(2,"0");
      return `${dd}/${mm}/${yy} ${hh}:${mi}`;
    }catch{ return iso; }
  }

  function _entryOk(e){ return e.b2_ok ?? e.gdrive_ok; }
  function _entryLink(e){ return e.b2_link ?? e.gdrive_link; }

  async function loadBackupStatus(){
    const sum  = document.getElementById("backupSummary");
    const hist = document.getElementById("backupHistory");
    const folder = document.getElementById("backupFolder");
    try {
      const r = await fetch("/master/api/backup/status");
      const j = await r.json();
      const b2 = j.b2 || {};
      const h = j.history || [];
      const last = h[0];
      const dashboard = b2.dashboard || "";
      if (!b2.configured){
        sum.innerHTML = '<span style="color:var(--ds-warning)">⚠ Backblaze B2 não configurado</span> — definir <code>B2_KEY_ID</code>, <code>B2_APPLICATION_KEY</code> e <code>B2_BUCKET_NAME</code> no Railway';
        folder.style.display = "none";
      } else if (last && _entryOk(last)){
        sum.innerHTML = `<span style="color:var(--ds-success)">● Último:</span> ${_fmtBr(last.ts)} (${last.size_kb} KB, ${last.tipo}) · bucket <code>${b2.bucket}</code>`;
        folder.href = dashboard;
        folder.style.display = "inline-flex";
      } else if (last){
        sum.innerHTML = `<span style="color:var(--ds-danger)">✗ Último falhou:</span> ${_fmtBr(last.ts)} — ${last.error || "ver logs"}`;
        folder.href = dashboard;
        folder.style.display = dashboard ? "inline-flex" : "none";
      } else {
        sum.innerHTML = `<span style="color:var(--ds-ink-muted)">Nenhum backup registrado ainda — bucket <code>${b2.bucket}</code> configurado, clique em "Fazer backup agora" para testar</span>`;
        folder.href = dashboard;
        folder.style.display = dashboard ? "inline-flex" : "none";
      }
      if (h.length){
        const rows = h.slice(0, 8).map(e => {
          const ok = _entryOk(e) ? '<span style="color:var(--ds-success)">✓</span>' : '<span style="color:var(--ds-danger)">✗</span>';
          const link = _entryLink(e) ? ` · <a href="${_entryLink(e)}" target="_blank" rel="noopener" style="color:var(--ds-ink-muted)">painel</a>` : '';
          const nome = e.b2_name ? ` · <code style="font-size:11px;color:var(--ds-ink-muted)">${e.b2_name}</code>` : '';
          const err = e.error ? ` · <span style="color:var(--ds-danger)">${e.error.slice(0,80)}</span>` : '';
          return `<div style="padding:3px 0">${ok} ${_fmtBr(e.ts)} · ${e.size_kb} KB · ${e.tipo}${e.ator ? ' por '+e.ator : ''}${nome}${link}${err}</div>`;
        }).join("");
        hist.innerHTML = `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--ds-line)">${rows}</div>`;
      } else {
        hist.innerHTML = "";
      }
    } catch (err) {
      sum.textContent = "erro ao consultar status";
    }
  }

  document.getElementById("backupTestRestore").addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    if (!confirm("Testar restore: baixa o último ZIP do B2 e valida que é restaurável. Pode demorar 30s-2min.")) return;
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = "Validando…";
    try {
      const token = await getCsrf();
      const r = await fetch("/master/api/backup/test-restore", {
        method: "POST",
        headers: { "X-CSRF-Token": token }
      });
      const j = await r.json();
      if (j.ok) {
        alert(`✓ Backup íntegro\n\nArquivo: ${j.ultimo_arquivo}\nValidados: ${j.validos.length} itens\nFalhas: 0`);
      } else {
        const falhasMsg = (j.falhas || []).slice(0,5).map(f => `• ${f.arquivo}: ${f.erro}`).join("\n");
        alert(`✗ Backup com falhas\n\nArquivo: ${j.ultimo_arquivo || '?'}\nFalhas:\n${falhasMsg || j.error || 'erro desconhecido'}`);
      }
    } catch (err) {
      alert("Erro: " + err.message);
    } finally {
      btn.textContent = original;
      btn.disabled = false;
    }
  });

  document.getElementById("backupNow").addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    if (!confirm("Rodar backup agora? Vai gerar o ZIP e subir no Backblaze B2.")) return;
    btn.disabled = true;
    const originalHTML = btn.innerHTML;
    btn.innerHTML = `<span class="ab-icon">${AstroShell.icon("save")}</span>Rodando…`;
    try {
      const token = await getCsrf();
      const r = await fetch("/master/api/backup/now", {
        method: "POST",
        headers: { "X-CSRF-Token": token }
      });
      const j = await r.json();
      const b2 = j.b2 || {};
      if (!j.ok) {
        alert("Falhou: " + (b2.error || j.error || "erro desconhecido"));
      } else if (b2.ok) {
        alert(`Backup concluído (${j.size_kb} KB)\nArquivo no B2: ${b2.name}`);
      } else if (b2.skipped) {
        alert(`Backup gerado (${j.size_kb} KB) — B2 não configurado, só email.`);
      } else {
        alert(`Backup gerado (${j.size_kb} KB) — B2 falhou: ${b2.error || '?'}`);
      }
    } catch (err) {
      alert("Erro: " + err.message);
    } finally {
      btn.innerHTML = originalHTML;
      btn.disabled = false;
      loadBackupStatus();
    }
  });

  async function loadMaintStatus() {
    const statusEl = document.getElementById("maintStatus");
    const btn      = document.getElementById("maintToggle");
    const lbl      = document.getElementById("maintLabel");
    const icon     = document.getElementById("maintIcon");
    try {
      const r = await fetch("/master/api/maintenance");
      const j = await r.json();
      if (j.active) {
        const det = j.detalhe || {};
        const desde = det.ligado_em || "?";
        const por = det.por || "?";
        statusEl.innerHTML = `<strong style="color:var(--ds-danger)">● LIGADO</strong> desde ${desde} por ${por}`;
        lbl.textContent   = "Desligar manutenção";
        icon.innerHTML    = AstroShell.icon("wrench");
        btn.dataset.action = "off";
        btn.classList.add("danger");
      } else {
        statusEl.innerHTML = `<span style="color:var(--ds-success)">● Desligado</span> — sistema operando normalmente`;
        lbl.textContent   = "Ligar manutenção";
        icon.innerHTML    = AstroShell.icon("wrench");
        btn.dataset.action = "on";
        btn.classList.remove("danger");
      }
    } catch {
      statusEl.textContent = "erro ao consultar";
    }
  }

  document.getElementById("maintToggle").addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    const lbl = document.getElementById("maintLabel");
    const action = btn.dataset.action;
    const label = action === "on" ? "LIGAR" : "DESLIGAR";
    if (!confirm(`${label} modo manutenção? Isso ${action === "on" ? "bloqueia" : "libera"} acesso das unidades.`)) return;
    btn.disabled = true;
    lbl.textContent = "Aguarde…";
    try {
      const token = await getCsrf();
      const r = await fetch(`/master/api/maintenance/${action}`, {
        method: "POST",
        headers: { "X-CSRF-Token": token }
      });
      const j = await r.json();
      if (!j.success) throw new Error(j.error || "falhou");
      await loadMaintStatus();
    } catch (err) {
      alert("Erro: " + err.message);
      await loadMaintStatus();
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById("smtpTest").addEventListener("click", async () => {
    const to = prompt("Email para receber teste:", "smiguel2.spv@gmail.com");
    if (!to) return;
    const btn = document.getElementById("smtpTest");
    btn.disabled = true;
    const originalHTML = btn.innerHTML;
    btn.innerHTML = `<span class="ab-icon">${AstroShell.icon("send")}</span>Testando…`;
    const qs = (extra) => `/master/api/debug/email-test?to=${encodeURIComponent(to)}${extra ? "&" + extra : ""}`;
    const combos = [
      { label: "Resend (API HTTPS)", url: qs("provider=resend") },
      { label: "SMTP 465 SSL",       url: qs("provider=smtp&port=465&mode=ssl") },
      { label: "SMTP 587 STARTTLS",  url: qs("provider=smtp&port=587&mode=starttls") },
    ];
    try {
      const results = await Promise.all(combos.map(async c => {
        try {
          const r = await fetch(c.url);
          const d = await r.json();
          return { label: c.label, ok: d.result === "ENVIADO", d };
        } catch (e) {
          return { label: c.label, ok: false, d: { result: "FETCH_ERROR", error: String(e) } };
        }
      }));
      const linhas = [];
      results.forEach(res => {
        const mark = res.ok ? "OK" : "FAIL";
        linhas.push(`=== [${mark}] ${res.label} ===`);
        linhas.push(`Resultado: ${res.d.result || "?"}`);
        if (res.d.message) linhas.push(res.d.message);
        if (res.d.error)   linhas.push(`Erro: ${res.d.error}`);
        if (res.d.hint)    linhas.push(`Dica: ${res.d.hint}`);
        linhas.push("");
      });
      const cfg = results[0].d.config || {};
      linhas.push("Config geral:");
      linhas.push(`  ALERT_EMAILS=${(cfg.ALERT_EMAILS_parsed || []).join(", ") || "(vazio)"}`);
      linhas.push(`  destinatario deste teste=${(cfg.recipients_used || []).join(", ") || "(vazio)"}`);
      alert(linhas.join("\n"));
    } catch (err) {
      alert("Erro: " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  loadMaintStatus();
  loadBackupStatus();
</script>
</body>
</html>
