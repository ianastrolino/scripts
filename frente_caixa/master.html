<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Vistorias — Painel Master</title>
  <link rel="icon" type="image/png" href="/assets/img/astro-a.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/design-system.css">
  <link rel="stylesheet" href="/assets/app-shell.css">
  <style>
    /* ── Unit grid (painel master) ──────────────────────────── */
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--ds-space-4);
    }

    .unit-card {
      background: var(--ds-surface);
      border: 1px solid var(--ds-line);
      border-radius: var(--ds-radius-lg);
      overflow: hidden;
      box-shadow: var(--ds-shadow-xs);
      transition: box-shadow var(--ds-duration-2) var(--ds-ease),
                  border-color var(--ds-duration-2) var(--ds-ease);
    }
    .unit-card:hover { box-shadow: var(--ds-shadow-md); border-color: var(--ds-line-strong); }

    .unit-header {
      padding: var(--ds-space-4) var(--ds-space-5) var(--ds-space-3);
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 1px solid var(--ds-line);
    }
    .unit-name { font-size: var(--ds-text-xl); font-weight: var(--ds-weight-black); color: var(--ds-ink); letter-spacing: var(--ds-tracking-tight); }
    .unit-id   { font-size: var(--ds-text-xs); color: var(--ds-ink-muted); margin-top: 2px; }

    .status-badge {
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      padding: 3px var(--ds-space-3); border-radius: var(--ds-radius-full);
      flex-shrink: 0; text-transform: uppercase; letter-spacing: .04em;
    }
    .status-badge.open    { background: var(--ds-success-soft); color: var(--ds-success); }
    .status-badge.closed  { background: var(--ds-surface-alt);  color: var(--ds-ink-muted); }
    .status-badge.loading { background: var(--ds-surface-alt);  color: var(--ds-ink-subtle); }

    .tiny-row {
      padding: var(--ds-space-3) var(--ds-space-5);
      border-bottom: 1px solid var(--ds-line);
      display: flex; align-items: center; justify-content: space-between;
      font-size: var(--ds-text-sm);
    }
    .tiny-label { color: var(--ds-ink-muted); font-weight: var(--ds-weight-semi); }
    .tiny-status { display: flex; align-items: center; gap: 6px; font-weight: var(--ds-weight-bold); }
    .tiny-dot { width: 8px; height: 8px; border-radius: 50%; }
    .tiny-ok      .tiny-dot    { background: var(--ds-success); }
    .tiny-ok      .tiny-status { color: var(--ds-success); }
    .tiny-renovar .tiny-dot    { background: var(--ds-warning); }
    .tiny-renovar .tiny-status { color: var(--ds-warning); }
    .tiny-erro    .tiny-dot,
    .tiny-ausente .tiny-dot    { background: var(--ds-danger); }
    .tiny-erro    .tiny-status,
    .tiny-ausente .tiny-status { color: var(--ds-danger); }
    .tiny-reauth {
      background: var(--ds-danger-soft); border: 1px solid #fecaca; color: var(--ds-danger);
      padding: 4px var(--ds-space-3); border-radius: var(--ds-radius-sm);
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      text-decoration: none; transition: background var(--ds-duration-2) var(--ds-ease);
    }
    .tiny-reauth:hover { background: #fee2e2; }

    .unit-stats {
      padding: var(--ds-space-4) var(--ds-space-5);
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: var(--ds-space-2);
      border-bottom: 1px solid var(--ds-line);
    }
    .stat { text-align: center; }
    .stat-val { font-size: var(--ds-text-lg); font-weight: var(--ds-weight-black); color: var(--ds-ink); font-variant-numeric: tabular-nums; }
    .stat-lbl { font-size: 10px; color: var(--ds-ink-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    .unit-actions {
      padding: var(--ds-space-3) var(--ds-space-5);
      display: flex; gap: var(--ds-space-2);
    }
    .action-btn {
      flex: 1; text-align: center; padding: var(--ds-space-2) var(--ds-space-1);
      border-radius: var(--ds-radius-md); text-decoration: none;
      font-size: var(--ds-text-sm); font-weight: var(--ds-weight-semi);
      transition: opacity var(--ds-duration-2) var(--ds-ease);
    }
    .action-btn:hover { opacity: .85; }
    .action-btn.primary   { background: var(--ds-accent-600); color: #fff; }
    .action-btn.secondary { background: var(--ds-surface-alt); color: var(--ds-ink); }
    .action-btn.tertiary  { background: #ede9fe; color: #6d28d9; }
  </style>
</head>
<body>

<div id="app-shell"></div>

<main id="app-main">
  <div class="app-content">
    <div class="app-content-wrap">
      <div class="app-page-header">
        <div class="app-page-eyebrow">Rede Astro</div>
        <h1 class="app-page-title">Unidades</h1>
        <p class="app-page-sub" id="pageDate"></p>
      </div>

      <div class="unit-grid" id="unitGrid">
        <p class="ds-loading">Carregando unidades...</p>
      </div>
    </div>
  </div>
</main>

<script src="/assets/app-shell.js"></script>
<script>
  AstroShell.init({
    active: "master",
    breadcrumbs: [
      { label: "Rede" },
      { label: "Painel Master", current: true }
    ]
  });

  // Data de hoje
  const hoje = new Date().toLocaleDateString("pt-BR", {weekday:"long", day:"2-digit", month:"long", year:"numeric"});
  document.getElementById("pageDate").textContent = hoje.charAt(0).toUpperCase() + hoje.slice(1);

  async function loadUnits() {
    const grid = document.getElementById("unitGrid");
    try {
      const res  = await fetch("/master/api/units");
      const data = await res.json();
      if (!data.units || data.units.length === 0) {
        grid.innerHTML = '<p class="ds-loading">Nenhuma unidade configurada.</p>';
        return;
      }
      grid.innerHTML = data.units.map(u => `
        <div class="unit-card" id="card-${u.id}">
          <div class="unit-header">
            <div>
              <div class="unit-name">${u.nome}</div>
            </div>
            <span class="status-badge loading" id="status-${u.id}">...</span>
          </div>
          <div class="unit-stats" id="stats-${u.id}">
            <div class="stat"><div class="stat-val" id="lancamentos-${u.id}">—</div><div class="stat-lbl">Lançamentos</div></div>
            <div class="stat"><div class="stat-val" id="total-${u.id}">—</div><div class="stat-lbl">Total AV</div></div>
            <div class="stat"><div class="stat-val" id="fa-${u.id}">—</div><div class="stat-lbl">A Faturar</div></div>
          </div>
          <div class="tiny-row" id="tiny-row-${u.id}">
            <span class="tiny-label">Tiny</span>
            <span class="tiny-status"><span class="tiny-dot"></span><span id="tiny-text-${u.id}">verificando...</span></span>
          </div>
          <div class="unit-actions">
            <a href="/u/${u.id}/caixa2" class="action-btn primary">💰 Caixa do Dia</a>
            <a href="/u/${u.id}/fechamento" class="action-btn secondary">✓ Fechamento</a>
            <a href="/u/${u.id}/gerencial" class="action-btn tertiary">📊 Gerencial</a>
          </div>
        </div>
      `).join("");

      data.units.forEach(u => loadUnitStatus(u.id));
      loadTinyHealth();
    } catch (err) {
      grid.innerHTML = '<p class="ds-loading">Erro ao carregar unidades.</p>';
    }
  }

  async function loadUnitStatus(unitId) {
    try {
      const res  = await fetch(`/u/${unitId}/api/caixa/estado`);
      const data = await res.json();
      const badge = document.getElementById(`status-${unitId}`);
      const lancamentos = (data.lancamentos || []).length;
      const totais = data.totais || {};

      if (data.aberto) {
        badge.textContent = "● Aberto";
        badge.className = "status-badge open";
      } else {
        badge.textContent = "Fechado";
        badge.className = "status-badge closed";
      }

      document.getElementById(`lancamentos-${unitId}`).textContent = lancamentos;
      document.getElementById(`total-${unitId}`).textContent = fmt(totais.total_avista ?? totais.total ?? 0);
      document.getElementById(`fa-${unitId}`).textContent = fmt(totais.faturado ?? 0);
    } catch (_) {
      const badge = document.getElementById(`status-${unitId}`);
      if (badge) { badge.textContent = "—"; badge.className = "status-badge closed"; }
    }
  }

  function fmt(v) {
    return "R$\u00a0" + Number(v).toLocaleString("pt-BR", {minimumFractionDigits:0, maximumFractionDigits:0});
  }

  async function loadTinyHealth() {
    try {
      const res = await fetch("/master/api/tiny-health");
      const data = await res.json();
      (data.units || []).forEach(u => {
        const row = document.getElementById(`tiny-row-${u.id}`);
        const text = document.getElementById(`tiny-text-${u.id}`);
        if (!row || !text) return;
        row.classList.remove("tiny-ok","tiny-renovar","tiny-erro","tiny-ausente");
        const labels = {
          ok: "Autorizado",
          renovar: "Renovacao pendente",
          ausente: "Nao autorizado",
          erro: "Erro"
        };
        row.classList.add(`tiny-${u.status}`);
        text.textContent = labels[u.status] || u.status;
        if (u.status === "ausente" || u.status === "erro") {
          row.innerHTML += `<a class="tiny-reauth" href="/u/${u.id}/auth" target="_blank">Reautorizar</a>`;
        }
      });
    } catch (_) {}
  }

  loadUnits();
</script>
</body>
</html>
