<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Vistorias — Painel Master</title>
  <link rel="icon" type="image/png" href="/assets/img/astro-a.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/design-system.css">
  <link rel="stylesheet" href="/assets/app-shell.css">
  <style>
    /* ── Unit grid (painel master) ──────────────────────────── */
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--ds-space-4);
    }

    .unit-card {
      background: var(--ds-surface);
      border: 1px solid var(--ds-line);
      border-radius: var(--ds-radius-lg);
      overflow: hidden;
      box-shadow: var(--ds-shadow-xs);
      transition: box-shadow var(--ds-duration-2) var(--ds-ease),
                  border-color var(--ds-duration-2) var(--ds-ease);
    }
    .unit-card:hover { box-shadow: var(--ds-shadow-md); border-color: var(--ds-line-strong); }

    .unit-header {
      padding: var(--ds-space-4) var(--ds-space-5) var(--ds-space-3);
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 1px solid var(--ds-line);
    }
    .unit-name { font-size: var(--ds-text-xl); font-weight: var(--ds-weight-black); color: var(--ds-ink); letter-spacing: var(--ds-tracking-tight); }
    .unit-id   { font-size: var(--ds-text-xs); color: var(--ds-ink-muted); margin-top: 2px; }

    .status-badge {
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      padding: 3px var(--ds-space-3); border-radius: var(--ds-radius-full);
      flex-shrink: 0; text-transform: uppercase; letter-spacing: .04em;
    }
    .status-badge.open    { background: var(--ds-success-soft); color: var(--ds-success); }
    .status-badge.closed  { background: var(--ds-surface-alt);  color: var(--ds-ink-muted); }
    .status-badge.loading { background: var(--ds-surface-alt);  color: var(--ds-ink-subtle); }

    .tiny-row {
      padding: var(--ds-space-3) var(--ds-space-5);
      border-bottom: 1px solid var(--ds-line);
      display: flex; align-items: center; justify-content: space-between;
      font-size: var(--ds-text-sm);
    }
    .tiny-label { color: var(--ds-ink-muted); font-weight: var(--ds-weight-semi); }
    .tiny-status { display: flex; align-items: center; gap: 6px; font-weight: var(--ds-weight-bold); }
    .tiny-dot { width: 8px; height: 8px; border-radius: 50%; }
    .tiny-ok      .tiny-dot    { background: var(--ds-success); }
    .tiny-ok      .tiny-status { color: var(--ds-success); }
    .tiny-renovar .tiny-dot    { background: var(--ds-warning); }
    .tiny-renovar .tiny-status { color: var(--ds-warning); }
    .tiny-erro    .tiny-dot,
    .tiny-ausente .tiny-dot    { background: var(--ds-danger); }
    .tiny-erro    .tiny-status,
    .tiny-ausente .tiny-status { color: var(--ds-danger); }
    .tiny-reauth {
      background: var(--ds-danger-soft); border: 1px solid #fecaca; color: var(--ds-danger);
      padding: 4px var(--ds-space-3); border-radius: var(--ds-radius-sm);
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      text-decoration: none; transition: background var(--ds-duration-2) var(--ds-ease);
    }
    .tiny-reauth:hover { background: #fee2e2; }

    .unit-stats {
      padding: var(--ds-space-4) var(--ds-space-5);
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: var(--ds-space-2);
      border-bottom: 1px solid var(--ds-line);
    }
    .stat { text-align: center; }
    .stat-val { font-size: var(--ds-text-lg); font-weight: var(--ds-weight-black); color: var(--ds-ink); font-variant-numeric: tabular-nums; }
    .stat-lbl { font-size: 10px; color: var(--ds-ink-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    .unit-actions {
      padding: var(--ds-space-3) var(--ds-space-5);
      display: flex; gap: var(--ds-space-2);
    }
    .action-btn {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--ds-radius-md);
      text-decoration: none; cursor: pointer;
      font-family: inherit;
      font-size: var(--ds-text-sm); font-weight: var(--ds-weight-semi);
      line-height: 1; white-space: nowrap;
      background: var(--ds-surface);
      border: 1px solid var(--ds-line);
      color: var(--ds-ink);
      transition: background var(--ds-duration-2) var(--ds-ease),
                  border-color var(--ds-duration-2) var(--ds-ease),
                  color var(--ds-duration-2) var(--ds-ease);
    }
    .action-btn:hover {
      background: var(--ds-surface-alt);
      border-color: var(--ds-line-strong);
    }
    .action-btn:disabled {
      opacity: .6; cursor: not-allowed;
    }
    .action-btn .ab-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; flex-shrink: 0;
    }
    .action-btn .ab-icon svg { width: 18px; height: 18px; }

    .action-btn.primary {
      background: var(--ds-accent-600);
      border-color: var(--ds-accent-600);
      color: #fff;
    }
    .action-btn.primary:hover {
      background: var(--ds-accent-700, #1d4ed8);
      border-color: var(--ds-accent-700, #1d4ed8);
    }

    .action-btn.danger {
      background: var(--ds-danger-soft);
      border-color: #fecaca;
      color: var(--ds-danger);
    }
    .action-btn.danger:hover { background: #fee2e2; }

    /* Pulse verde quando chega um lancamento novo */
    @keyframes newLancPulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.55); border-color: var(--ds-success); }
      60%  { box-shadow: 0 0 0 14px rgba(34,197,94,0);   border-color: var(--ds-success); }
      100% { box-shadow: var(--ds-shadow-xs); border-color: var(--ds-line); }
    }
    .unit-card.pulse-new { animation: newLancPulse 2.2s ease-out 1; }
    .unit-card.tiny-alert { border-color: var(--ds-danger); }

    .unit-last {
      padding: 6px var(--ds-space-5) 8px;
      font-size: var(--ds-text-xs);
      color: var(--ds-ink-muted);
      border-bottom: 1px solid var(--ds-line);
    }
    .unit-last-top {
      display: flex; justify-content: space-between; align-items: center;
    }
    .unit-last.fresh .unit-last-top { color: var(--ds-success); font-weight: var(--ds-weight-semi); }
    .unit-last-extra {
      margin-top: 2px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .01em;
      color: var(--ds-ink-subtle);
      opacity: .65;
      white-space: nowrap; overflow: hidden;
      font-variant-numeric: tabular-nums;
      -webkit-mask-image: linear-gradient(to right, #000 0, #000 85%, transparent 100%);
              mask-image: linear-gradient(to right, #000 0, #000 85%, transparent 100%);
    }
    .unit-last-extra .sep { color: var(--ds-line-strong); margin: 0 5px; opacity: .7; }
    .unit-last-extra .val { color: var(--ds-ink-muted); font-weight: 500; }

    .refresh-bar {
      display: flex; align-items: center; gap: 8px;
      font-size: var(--ds-text-xs);
      color: var(--ds-ink-muted);
      margin-bottom: var(--ds-space-3);
    }
    .refresh-bar .rb-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ds-success);
      animation: rbPulse 2s ease-in-out infinite;
    }
    .refresh-bar.loading .rb-dot { background: var(--ds-warning); animation: rbSpin 0.8s linear infinite; }
    @keyframes rbPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    @keyframes rbSpin  { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="app-shell"></div>

<main id="app-main">
  <div class="app-content">
    <div class="app-content-wrap">
      <div class="app-page-header">
        <div class="app-page-eyebrow">Rede Astro</div>
        <h1 class="app-page-title">Unidades</h1>
        <p class="app-page-sub" id="pageDate"></p>
      </div>

      <div id="opsBar" style="display:flex;gap:var(--ds-space-3);flex-wrap:wrap;align-items:center;margin-bottom:var(--ds-space-5);padding:var(--ds-space-3) var(--ds-space-4);background:var(--ds-surface-alt);border:1px solid var(--ds-line);border-radius:var(--ds-radius-lg)">
        <div style="flex:1;min-width:220px">
          <div style="font-size:var(--ds-text-xs);color:var(--ds-ink-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em">Modo manutenção</div>
          <div id="maintStatus" style="font-size:var(--ds-text-sm);color:var(--ds-ink);margin-top:2px">carregando...</div>
        </div>
        <button id="maintToggle" class="action-btn" style="min-width:200px;flex:0 0 auto">
          <span class="ab-icon" id="maintIcon"></span><span id="maintLabel">...</span>
        </button>
        <button id="smtpTest" class="action-btn" style="min-width:180px;flex:0 0 auto">
          <span class="ab-icon" id="smtpIcon"></span>Testar e-mail
        </button>
        <a id="backupDl" href="/gerencial/api/backup/download" class="action-btn" style="min-width:180px;flex:0 0 auto">
          <span class="ab-icon" id="backupIcon"></span>Baixar backup
        </a>
      </div>

      <div class="refresh-bar" id="refreshBar">
        <span class="rb-dot"></span>
        <span id="refreshText">Atualizando a cada 30s · última às <span id="refreshLast">—</span></span>
      </div>

      <div class="unit-grid" id="unitGrid">
        <p class="ds-loading">Carregando unidades...</p>
      </div>
    </div>
  </div>
</main>

<script src="/assets/app-shell.js"></script>
<script>
  AstroShell.init({
    active: "master",
    breadcrumbs: [
      { label: "Rede" },
      { label: "Painel Master", current: true }
    ]
  });

  // Data de hoje
  const hoje = new Date().toLocaleDateString("pt-BR", {weekday:"long", day:"2-digit", month:"long", year:"numeric"});
  document.getElementById("pageDate").textContent = hoje.charAt(0).toUpperCase() + hoje.slice(1);

  async function loadUnits() {
    const grid = document.getElementById("unitGrid");
    try {
      const res  = await fetch("/master/api/units");
      const data = await res.json();
      if (!data.units || data.units.length === 0) {
        grid.innerHTML = '<p class="ds-loading">Nenhuma unidade configurada.</p>';
        return;
      }
      grid.innerHTML = data.units.map(u => `
        <div class="unit-card" id="card-${u.id}">
          <div class="unit-header">
            <div>
              <div class="unit-name">${u.nome}</div>
            </div>
            <span class="status-badge loading" id="status-${u.id}">...</span>
          </div>
          <div class="unit-stats" id="stats-${u.id}">
            <div class="stat"><div class="stat-val" id="lancamentos-${u.id}">—</div><div class="stat-lbl">Lançamentos</div></div>
            <div class="stat"><div class="stat-val" id="total-${u.id}">—</div><div class="stat-lbl">Total AV</div></div>
            <div class="stat"><div class="stat-val" id="fa-${u.id}">—</div><div class="stat-lbl">A Faturar</div></div>
          </div>
          <div class="unit-last" id="last-${u.id}">
            <div class="unit-last-top">
              <span>Última atividade</span>
              <span id="last-text-${u.id}">—</span>
            </div>
            <div class="unit-last-extra" id="last-extra-${u.id}"></div>
          </div>
          <div class="tiny-row" id="tiny-row-${u.id}">
            <span class="tiny-label">Tiny</span>
            <span class="tiny-status"><span class="tiny-dot"></span><span id="tiny-text-${u.id}">verificando...</span></span>
          </div>
          <div class="unit-actions">
            <a href="/u/${u.id}/caixa2" class="action-btn primary">
              <span class="ab-icon">${AstroShell.icon("caixa")}</span>Caixa do Dia
            </a>
            <a href="/u/${u.id}/fechamento" class="action-btn">
              <span class="ab-icon">${AstroShell.icon("fechamento")}</span>Fechamento
            </a>
            <a href="/u/${u.id}/gerencial" class="action-btn">
              <span class="ab-icon">${AstroShell.icon("gerencial")}</span>Gerencial
            </a>
          </div>
        </div>
      `).join("");

      await refreshAll();
      // Auto-refresh a cada 30s
      setInterval(refreshAll, 30_000);
    } catch (err) {
      grid.innerHTML = '<p class="ds-loading">Erro ao carregar unidades.</p>';
    }
  }

  // Snapshot do ultimo refresh por unidade pra detectar delta
  const _lastSnapshot = {};

  async function refreshAll() {
    const bar = document.getElementById("refreshBar");
    bar.classList.add("loading");
    try {
      // Status por unidade (em paralelo) + tiny-health consolidado + units/status pra 'ultima_atividade'
      const unitIds = Array.from(document.querySelectorAll(".unit-card")).map(el => el.id.replace("card-", ""));
      await Promise.all([
        ...unitIds.map(loadUnitStatus),
        loadTinyHealth(),
        loadUnitsAggregate(),
      ]);
      const now = new Date();
      document.getElementById("refreshLast").textContent = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } finally {
      bar.classList.remove("loading");
    }
  }

  async function loadUnitsAggregate() {
    try {
      const r = await fetch("/master/api/units/status", { cache: "no-store" });
      const d = await r.json();
      (d.status || []).forEach(u => {
        const el = document.getElementById(`last-text-${u.id}`);
        const wrap = document.getElementById(`last-${u.id}`);
        const extra = document.getElementById(`last-extra-${u.id}`);
        if (!el || !wrap) return;
        const ultima = u.hoje?.ultima_atividade;
        if (!ultima) {
          el.textContent = "—";
          wrap.classList.remove("fresh");
          if (extra) extra.textContent = "";
          return;
        }
        el.textContent = fmtRelative(ultima);
        const diffMs = Date.now() - new Date(ultima).getTime();
        wrap.classList.toggle("fresh", diffMs < 2 * 60_000);

        // Linha leve com detalhes do ultimo lancamento
        const ult = u.hoje?.ultimo;
        if (extra) {
          if (ult && (ult.placa || ult.servico || ult.valor)) {
            const placa = ult.placa ? esc(ult.placa) : "";
            const servico = ult.servico ? esc(ult.servico.length > 22 ? ult.servico.slice(0, 20) + "…" : ult.servico) : "";
            const valor = (ult.valor != null) ? `<span class="val">${fmt(ult.valor)}</span>` : "";
            const parts = [placa, servico, valor].filter(Boolean);
            extra.innerHTML = parts.join('<span class="sep">·</span>');
          } else {
            extra.textContent = "";
          }
        }
      });
    } catch (_) {}
  }

  function esc(s) {
    return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function fmtRelative(iso) {
    const t = new Date(iso).getTime();
    if (isNaN(t)) return "—";
    const diff = Math.max(0, Math.floor((Date.now() - t) / 1000));
    if (diff < 60)       return `há ${diff}s`;
    if (diff < 3600)     return `há ${Math.floor(diff / 60)} min`;
    if (diff < 86400)    return `há ${Math.floor(diff / 3600)}h`;
    return new Date(iso).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  async function loadUnitStatus(unitId) {
    try {
      const res  = await fetch(`/u/${unitId}/api/caixa/estado`, { cache: "no-store" });
      const data = await res.json();
      const badge = document.getElementById(`status-${unitId}`);
      const lancamentos = (data.lancamentos || []).length;
      const totais = data.totais || {};

      if (data.aberto) {
        badge.textContent = "● Aberto";
        badge.className = "status-badge open";
      } else {
        badge.textContent = "Fechado";
        badge.className = "status-badge closed";
      }

      document.getElementById(`lancamentos-${unitId}`).textContent = lancamentos;
      document.getElementById(`total-${unitId}`).textContent = fmt(totais.total_avista ?? totais.total ?? 0);
      document.getElementById(`fa-${unitId}`).textContent = fmt(totais.faturado ?? 0);

      // Delta: se contagem aumentou desde o ultimo refresh, pulse no card
      const prev = _lastSnapshot[unitId];
      if (prev !== undefined && lancamentos > prev) {
        const card = document.getElementById(`card-${unitId}`);
        if (card) {
          card.classList.remove("pulse-new");
          // reflow pra reiniciar a animacao
          void card.offsetWidth;
          card.classList.add("pulse-new");
        }
      }
      _lastSnapshot[unitId] = lancamentos;
    } catch (_) {
      const badge = document.getElementById(`status-${unitId}`);
      if (badge) { badge.textContent = "—"; badge.className = "status-badge closed"; }
    }
  }

  function fmt(v) {
    return "R$\u00a0" + Number(v).toLocaleString("pt-BR", {minimumFractionDigits:0, maximumFractionDigits:0});
  }

  async function loadTinyHealth() {
    try {
      const res = await fetch("/master/api/tiny-health", { cache: "no-store" });
      const data = await res.json();
      (data.units || []).forEach(u => {
        const row  = document.getElementById(`tiny-row-${u.id}`);
        const text = document.getElementById(`tiny-text-${u.id}`);
        const card = document.getElementById(`card-${u.id}`);
        if (!row || !text) return;
        row.classList.remove("tiny-ok","tiny-renovar","tiny-erro","tiny-ausente");
        const labels = {
          ok: "Autorizado",
          renovar: "Renovacao pendente",
          ausente: "Nao autorizado",
          erro: "Erro"
        };
        row.classList.add(`tiny-${u.status}`);
        text.textContent = labels[u.status] || u.status;

        // Remove link antigo se houver (evita duplicar em refreshes)
        row.querySelectorAll(".tiny-reauth").forEach(n => n.remove());
        if (u.status === "ausente" || u.status === "erro") {
          const a = document.createElement("a");
          a.className   = "tiny-reauth";
          a.href        = `/u/${u.id}/auth`;
          a.target      = "_blank";
          a.rel         = "noopener";
          a.textContent = "Reautorizar";
          row.appendChild(a);
        }
        // Borda vermelha no card inteiro quando Tiny problema
        if (card) card.classList.toggle("tiny-alert", u.status === "ausente" || u.status === "erro");
      });
    } catch (_) {}
  }

  // ── OpsBar (manutencao + SMTP) ──────────────────────────────
  let _csrfToken = "";
  async function getCsrf() {
    if (_csrfToken) return _csrfToken;
    try {
      const r = await fetch("/api/csrf-token");
      const j = await r.json();
      _csrfToken = j.token || "";
    } catch { _csrfToken = ""; }
    return _csrfToken;
  }

  // Preenche ícones estáticos dos botões da barra de ops
  document.getElementById("smtpIcon").innerHTML = AstroShell.icon("send");
  document.getElementById("backupIcon").innerHTML = AstroShell.icon("download");

  async function loadMaintStatus() {
    const statusEl = document.getElementById("maintStatus");
    const btn      = document.getElementById("maintToggle");
    const lbl      = document.getElementById("maintLabel");
    const icon     = document.getElementById("maintIcon");
    try {
      const r = await fetch("/master/api/maintenance");
      const j = await r.json();
      if (j.active) {
        const det = j.detalhe || {};
        const desde = det.ligado_em || "?";
        const por = det.por || "?";
        statusEl.innerHTML = `<strong style="color:var(--ds-danger)">● LIGADO</strong> desde ${desde} por ${por}`;
        lbl.textContent   = "Desligar manutenção";
        icon.innerHTML    = AstroShell.icon("wrench");
        btn.dataset.action = "off";
        btn.classList.add("danger");
      } else {
        statusEl.innerHTML = `<span style="color:var(--ds-success)">● Desligado</span> — sistema operando normalmente`;
        lbl.textContent   = "Ligar manutenção";
        icon.innerHTML    = AstroShell.icon("wrench");
        btn.dataset.action = "on";
        btn.classList.remove("danger");
      }
    } catch {
      statusEl.textContent = "erro ao consultar";
    }
  }

  document.getElementById("maintToggle").addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    const lbl = document.getElementById("maintLabel");
    const action = btn.dataset.action;
    const label = action === "on" ? "LIGAR" : "DESLIGAR";
    if (!confirm(`${label} modo manutenção? Isso ${action === "on" ? "bloqueia" : "libera"} acesso das unidades.`)) return;
    btn.disabled = true;
    lbl.textContent = "Aguarde…";
    try {
      const token = await getCsrf();
      const r = await fetch(`/master/api/maintenance/${action}`, {
        method: "POST",
        headers: { "X-CSRF-Token": token }
      });
      const j = await r.json();
      if (!j.success) throw new Error(j.error || "falhou");
      await loadMaintStatus();
    } catch (err) {
      alert("Erro: " + err.message);
      await loadMaintStatus();
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById("smtpTest").addEventListener("click", async () => {
    const to = prompt("Email para receber teste:", "smiguel2.spv@gmail.com");
    if (!to) return;
    const btn = document.getElementById("smtpTest");
    btn.disabled = true;
    const originalHTML = btn.innerHTML;
    btn.innerHTML = `<span class="ab-icon">${AstroShell.icon("send")}</span>Testando…`;
    const qs = (extra) => `/master/api/debug/email-test?to=${encodeURIComponent(to)}${extra ? "&" + extra : ""}`;
    // Testa os dois providers. O que nao estiver configurado volta FALTA_CONFIG.
    const combos = [
      { label: "Resend (API HTTPS)", url: qs("provider=resend") },
      { label: "SMTP 465 SSL",       url: qs("provider=smtp&port=465&mode=ssl") },
      { label: "SMTP 587 STARTTLS",  url: qs("provider=smtp&port=587&mode=starttls") },
    ];
    try {
      const results = await Promise.all(combos.map(async c => {
        try {
          const r = await fetch(c.url);
          const d = await r.json();
          return { label: c.label, ok: d.result === "ENVIADO", d };
        } catch (e) {
          return { label: c.label, ok: false, d: { result: "FETCH_ERROR", error: String(e) } };
        }
      }));
      const linhas = [];
      results.forEach(res => {
        const mark = res.ok ? "OK" : "FAIL";
        linhas.push(`=== [${mark}] ${res.label} ===`);
        linhas.push(`Resultado: ${res.d.result || "?"}`);
        if (res.d.message) linhas.push(res.d.message);
        if (res.d.error)   linhas.push(`Erro: ${res.d.error}`);
        if (res.d.hint)    linhas.push(`Dica: ${res.d.hint}`);
        linhas.push("");
      });
      const cfg = results[0].d.config || {};
      linhas.push("Config geral:");
      linhas.push(`  ALERT_EMAILS=${(cfg.ALERT_EMAILS_parsed || []).join(", ") || "(vazio)"}`);
      linhas.push(`  destinatario deste teste=${(cfg.recipients_used || []).join(", ") || "(vazio)"}`);
      alert(linhas.join("\n"));
    } catch (err) {
      alert("Erro: " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  });

  loadMaintStatus();
  loadUnits();
</script>
</body>
</html>
