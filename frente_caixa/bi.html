<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Vistorias — BI</title>
  <link rel="icon" type="image/png" href="/assets/img/astro-a.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/design-system.css">
  <link rel="stylesheet" href="/assets/app-shell.css">
  <style>
    :root {
      --card:   var(--ds-surface);
      --card2:  var(--ds-surface-alt);
      --border: var(--ds-line);
      --t1:     var(--ds-ink);
      --t2:     var(--ds-ink-muted);
      --rl:     var(--ds-radius-lg);
      --accent: var(--ds-accent-600);
    }

    .filter-bar {
      display: flex; align-items: center; gap: var(--ds-space-3); flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rl); padding: var(--ds-space-4) var(--ds-space-5);
      margin-bottom: var(--ds-space-5);
      box-shadow: var(--ds-shadow-xs);
    }
    .filter-label {
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      color: var(--ds-ink-muted); text-transform: uppercase;
      letter-spacing: var(--ds-tracking-wide);
    }
    .filter-select, .filter-input {
      background: var(--ds-surface); border: 1px solid var(--border);
      color: var(--t1); border-radius: var(--ds-radius-md);
      padding: 7px var(--ds-space-3);
      font-size: var(--ds-text-base); font-family: inherit;
      cursor: pointer; outline: none;
    }
    .filter-select:focus, .filter-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--ds-accent-100);
    }
    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--ds-radius-md);
      padding: 7px var(--ds-space-5);
      font-size: var(--ds-text-base); font-family: inherit;
      font-weight: var(--ds-weight-semi); cursor: pointer;
    }
    .btn-primary:hover { background: var(--ds-accent-700); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .btn-ghost {
      background: var(--ds-surface); color: var(--t1);
      border: 1px solid var(--border); border-radius: var(--ds-radius-md);
      padding: 7px var(--ds-space-4);
      font-size: var(--ds-text-sm); font-family: inherit;
      font-weight: var(--ds-weight-semi);
      cursor: pointer;
    }
    .btn-ghost:hover { background: var(--card2); border-color: var(--ds-line-strong); }
    .btn-ghost:disabled { opacity: .6; cursor: not-allowed; }

    .sync-status {
      margin-left: auto;
      font-size: var(--ds-text-sm);
      color: var(--t2);
    }
    .sync-status.ok   { color: var(--ds-success); }
    .sync-status.err  { color: var(--ds-danger); }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--ds-space-3); margin-bottom: var(--ds-space-5);
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rl); padding: var(--ds-space-5);
      position: relative; overflow: hidden;
      box-shadow: var(--ds-shadow-xs);
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%; background: var(--accent);
    }
    .card .lbl {
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      color: var(--ds-ink-muted); text-transform: uppercase;
      letter-spacing: var(--ds-tracking-wide);
      margin-bottom: 4px;
    }
    .card .val {
      font-size: var(--ds-text-xl); font-weight: var(--ds-weight-bold);
      color: var(--t1);
    }
    .card .sub {
      font-size: var(--ds-text-xs); color: var(--t2); margin-top: 2px;
    }

    /* Section */
    .g-section { margin-bottom: var(--ds-space-5); }
    .g-section-title {
      font-size: var(--ds-text-base); font-weight: var(--ds-weight-bold);
      color: var(--t1); margin-bottom: var(--ds-space-3);
      display: flex; align-items: center; gap: var(--ds-space-2);
    }

    /* Ranking tables */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--rl); overflow: hidden;
      box-shadow: var(--ds-shadow-xs);
    }
    table.rank { width: 100%; border-collapse: collapse; }
    table.rank th {
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      text-transform: uppercase; letter-spacing: var(--ds-tracking-wide);
      color: var(--ds-ink-muted);
      padding: var(--ds-space-3) var(--ds-space-5);
      border-bottom: 1px solid var(--border);
      text-align: left; background: var(--card2);
    }
    table.rank th.num, table.rank td.num { text-align: right; }
    table.rank td {
      padding: var(--ds-space-3) var(--ds-space-5);
      border-bottom: 1px solid var(--border);
      font-size: var(--ds-text-base); color: var(--t1);
    }
    table.rank tr:last-child td { border-bottom: none; }
    .pos {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--card2); color: var(--t2);
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
    }

    .g-loading { text-align: center; padding: var(--ds-space-10) var(--ds-space-5); color: var(--ds-ink-muted); font-size: var(--ds-text-md); }
    .g-empty   { text-align: center; padding: var(--ds-space-8) var(--ds-space-5); color: var(--ds-ink-muted); font-size: var(--ds-text-base); }
    .g-error   { text-align: center; padding: var(--ds-space-8) var(--ds-space-5); color: var(--ds-danger); font-size: var(--ds-text-base); }

    .two-cols {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--ds-space-5);
    }
    @media (max-width: 900px) { .two-cols { grid-template-columns: 1fr; } }

    .unit-row { font-size: var(--ds-text-sm); color: var(--t2); margin-top: 4px; }
  </style>
</head>
<body>

<div id="app-shell"></div>

<main id="app-main">
  <div class="app-content">
    <div class="app-content-wrap">
      <div class="app-page-header">
        <div class="app-page-eyebrow">Rede Astro</div>
        <h1 class="app-page-title">BI · Faturamento por mês</h1>
        <p class="app-page-sub">Consolidado a partir do histórico de contas a receber emitidas no Tiny</p>
      </div>

      <!-- Filtro + sync -->
      <div class="filter-bar">
        <span class="filter-label">Mês</span>
        <input class="filter-input" type="month" id="inpMes">

        <span class="filter-label">Unidade</span>
        <select class="filter-select" id="selUnit">
          <option value="all">Todas as unidades</option>
        </select>

        <button class="btn-primary" id="btnAplicar">Aplicar</button>
        <button class="btn-ghost" id="btnSync" title="Importa o mês selecionado do Tiny (pode levar 1-5 min).">Sincronizar do Tiny</button>
        <span class="sync-status" id="syncStatus"></span>
      </div>

      <!-- Cards totais -->
      <div class="cards" id="cardsStrip">
        <div class="g-loading" style="grid-column:1/-1">Carregando…</div>
      </div>

      <!-- Por unidade -->
      <div class="g-section">
        <div class="g-section-title">Por unidade</div>
        <div class="table-wrap">
          <table class="rank">
            <thead><tr>
              <th style="width:32px">#</th>
              <th>Unidade</th>
              <th class="num">Qtd</th>
              <th class="num">Total</th>
            </tr></thead>
            <tbody id="unitBody"><tr><td colspan="4" class="g-empty">—</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- Rankings -->
      <div class="two-cols">
        <div class="g-section">
          <div class="g-section-title">Top serviços</div>
          <div class="table-wrap">
            <table class="rank">
              <thead><tr>
                <th style="width:32px">#</th>
                <th>Serviço</th>
                <th class="num">Qtd</th>
                <th class="num">Total</th>
              </tr></thead>
              <tbody id="svcBody"><tr><td colspan="4" class="g-empty">—</td></tr></tbody>
            </table>
          </div>
        </div>

        <div class="g-section">
          <div class="g-section-title">Top clientes</div>
          <div class="table-wrap">
            <table class="rank">
              <thead><tr>
                <th style="width:32px">#</th>
                <th>Cliente</th>
                <th class="num">Qtd</th>
                <th class="num">Total</th>
              </tr></thead>
              <tbody id="cliBody"><tr><td colspan="4" class="g-empty">—</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="/assets/app-shell.js"></script>
<script>
  AstroShell.init({
    active: "bi-rede",
    breadcrumbs: [
      { label: "Rede" },
      { label: "BI", current: true }
    ]
  });

  const brl = v => "R$ " + Number(v || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const escHtml = s => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  // Default: mês corrente
  const now = new Date();
  const ymNow = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  const inpMes = document.getElementById("inpMes");
  inpMes.value = ymNow;

  // CSRF
  let _csrfToken = "";
  async function getCsrf(force = false) {
    if (!force && _csrfToken) return _csrfToken;
    try {
      const r = await fetch("/api/csrf-token");
      const j = await r.json();
      _csrfToken = j.token || "";
    } catch { _csrfToken = ""; }
    return _csrfToken;
  }

  async function loadUnidades() {
    try {
      const r = await fetch("/master/api/units");
      const j = await r.json();
      const sel = document.getElementById("selUnit");
      (j.units || []).forEach(u => {
        const o = document.createElement("option");
        o.value = u.id; o.textContent = u.nome;
        sel.appendChild(o);
      });
    } catch (e) { console.warn("unidades", e); }
  }

  async function carregar() {
    const mes  = inpMes.value;
    const unit = document.getElementById("selUnit").value;
    if (!mes) return;

    ["cardsStrip","unitBody","svcBody","cliBody"].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = id === "cardsStrip"
        ? '<div class="g-loading" style="grid-column:1/-1">Carregando…</div>'
        : '<tr><td colspan="4" class="g-loading">Carregando…</td></tr>';
    });

    try {
      const qs = new URLSearchParams({ mes });
      if (unit && unit !== "all") qs.set("unit", unit);
      const r = await fetch(`/gerencial/api/bi/faturamento?${qs}`);
      const j = await r.json();
      if (!j.success) throw new Error(j.error || "Erro.");

      renderCards(j);
      renderUnidades(j.por_unit);
      renderRanking("svcBody", j.ranking_servicos, "servico");
      renderRanking("cliBody", j.ranking_clientes, "cliente");
    } catch (e) {
      ["cardsStrip","unitBody","svcBody","cliBody"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = id === "cardsStrip"
          ? `<div class="g-error" style="grid-column:1/-1">${escHtml(e.message)}</div>`
          : `<tr><td colspan="4" class="g-error">${escHtml(e.message)}</td></tr>`;
      });
    }
  }

  function renderCards(j) {
    const el = document.getElementById("cardsStrip");
    const unidadesCount = Object.keys(j.por_unit || {}).length;
    el.innerHTML = `
      <div class="card"><div class="lbl">Faturamento total</div><div class="val">${brl(j.total)}</div><div class="sub">mês ${escHtml(j.mes)}</div></div>
      <div class="card"><div class="lbl">Lançamentos</div><div class="val">${Number(j.count).toLocaleString("pt-BR")}</div><div class="sub">${unidadesCount} unidade(s)</div></div>
      <div class="card"><div class="lbl">Ticket médio</div><div class="val">${brl(j.count ? j.total / j.count : 0)}</div><div class="sub">por lançamento</div></div>
    `;
  }

  function renderUnidades(porUnit) {
    const tbody = document.getElementById("unitBody");
    const rows = Object.entries(porUnit || {})
      .map(([slug, info]) => ({ slug, ...info }))
      .sort((a, b) => (b.total || 0) - (a.total || 0));
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="4" class="g-empty">—</td></tr>'; return; }
    tbody.innerHTML = rows.map((r, i) => `
      <tr>
        <td><span class="pos">${i + 1}</span></td>
        <td>${escHtml(r.nome || r.slug)}</td>
        <td class="num">${Number(r.count).toLocaleString("pt-BR")}</td>
        <td class="num">${brl(r.total)}</td>
      </tr>
    `).join("");
  }

  function renderRanking(tbodyId, lista, key) {
    const tbody = document.getElementById(tbodyId);
    if (!lista || !lista.length) { tbody.innerHTML = '<tr><td colspan="4" class="g-empty">—</td></tr>'; return; }
    tbody.innerHTML = lista.slice(0, 25).map((r, i) => `
      <tr>
        <td><span class="pos">${i + 1}</span></td>
        <td>${escHtml(r[key] || "—")}</td>
        <td class="num">${Number(r.count).toLocaleString("pt-BR")}</td>
        <td class="num">${brl(r.total)}</td>
      </tr>
    `).join("");
  }

  // Sync
  async function sincronizar() {
    const mes  = inpMes.value;
    const unit = document.getElementById("selUnit").value;
    if (!mes) { alert("Selecione o mês."); return; }
    if (!unit || unit === "all") {
      alert("Escolha uma unidade específica para sincronizar. (Sincronizar todas de uma vez não é suportado aqui — faça uma por vez.)");
      return;
    }
    if (!confirm(`Sincronizar o mês ${mes} da unidade ${unit} a partir do Tiny? Isso pode levar 1–5 minutos.`)) return;

    const btn = document.getElementById("btnSync");
    const status = document.getElementById("syncStatus");
    btn.disabled = true;
    status.className = "sync-status";
    status.textContent = "Sincronizando… não feche a página.";

    try {
      let token = await getCsrf();
      let r = await fetch("/gerencial/api/bi/sync-historico", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": token },
        body: JSON.stringify({ unit, mes }),
      });
      if (r.status === 403) {
        token = await getCsrf(true);
        r = await fetch("/gerencial/api/bi/sync-historico", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRF-Token": token },
          body: JSON.stringify({ unit, mes }),
        });
      }
      const j = await r.json();
      if (!j.success) throw new Error(j.error || "Erro.");
      status.className = "sync-status ok";
      status.textContent = `OK · API: ${j.total_api} · detalhes: ${j.detalhes_ok} · novos: ${j.novos} · atualizados: ${j.atualizados} (tabela: ${j.total_tabela})`;
      carregar();
    } catch (e) {
      status.className = "sync-status err";
      status.textContent = "Erro: " + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById("btnAplicar").addEventListener("click", carregar);
  document.getElementById("btnSync").addEventListener("click", sincronizar);
  inpMes.addEventListener("change", carregar);
  document.getElementById("selUnit").addEventListener("change", carregar);

  (async () => {
    await loadUnidades();
    carregar();
  })();
</script>
</body>
</html>
