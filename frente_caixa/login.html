<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Vistorias — Acesso</title>
  <link rel="icon" type="image/png" href="/assets/img/astro-a.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/design-system.css">
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--ds-space-5);
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #334155 100%);
      font-family: var(--ds-font-sans);
      color: var(--ds-ink);
      position: relative;
      overflow: hidden;
    }
    /* Glow ambiental */
    body::before, body::after {
      content: ""; position: absolute; pointer-events: none;
      border-radius: 50%; filter: blur(80px); opacity: .4;
    }
    body::before { width: 520px; height: 520px; background: #d32f2f; top: -120px; right: -120px; opacity: .18; }
    body::after  { width: 420px; height: 420px; background: #2563eb; bottom: -120px; left: -120px; opacity: .22; }

    /* Partículas decorativas (A's sutis flutuando) */
    .bg-a {
      position: absolute; opacity: .04;
      pointer-events: none; width: 200px; height: 200px;
    }
    .bg-a img { width: 100%; height: 100%; filter: brightness(0) invert(1); }
    .bg-a.one { top: 10%; left: 8%; transform: rotate(-15deg); animation: floatBg 14s ease-in-out infinite; }
    .bg-a.two { bottom: 12%; right: 10%; transform: rotate(20deg); width: 260px; height: 260px; animation: floatBg 18s ease-in-out infinite reverse; }
    @keyframes floatBg {
      0%,100% { transform: translateY(0) rotate(-15deg); }
      50%     { transform: translateY(-30px) rotate(-12deg); }
    }

    .shell {
      position: relative;
      width: 100%; max-width: 420px;
      z-index: 1;
    }

    .brand-hero {
      text-align: center;
      margin-bottom: var(--ds-space-6);
    }
    .brand-a {
      display: inline-flex;
      width: 88px; height: 88px;
      background: #fff;
      border-radius: var(--ds-radius-xl);
      align-items: center; justify-content: center;
      margin-bottom: var(--ds-space-4);
      box-shadow: 0 10px 30px rgba(15,23,42,.35), inset 0 0 0 1px rgba(255,255,255,.2);
      animation: floatA 4s ease-in-out infinite;
    }
    .brand-a img { width: 60px; height: 60px; }
    @keyframes floatA {
      0%,100% { transform: translateY(0); box-shadow: 0 10px 30px rgba(15,23,42,.35), inset 0 0 0 1px rgba(255,255,255,.2); }
      50%     { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(15,23,42,.5), inset 0 0 0 1px rgba(255,255,255,.2); }
    }
    .brand-title {
      font-size: var(--ds-text-3xl);
      font-weight: var(--ds-weight-black);
      color: #fff;
      letter-spacing: var(--ds-tracking-tight);
      line-height: 1.1;
    }
    .brand-sub {
      font-size: var(--ds-text-sm);
      color: rgba(255,255,255,.65);
      margin-top: var(--ds-space-2);
      font-weight: var(--ds-weight-medium);
    }

    .card {
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(12px);
      border-radius: var(--ds-radius-xl);
      padding: var(--ds-space-6) var(--ds-space-6) var(--ds-space-5);
      box-shadow: 0 20px 50px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05);
      animation: cardRise 500ms var(--ds-ease);
    }
    @keyframes cardRise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    .card-head {
      text-align: center;
      margin-bottom: var(--ds-space-5);
    }
    .card-eyebrow {
      font-size: var(--ds-text-xs);
      font-weight: var(--ds-weight-bold);
      letter-spacing: var(--ds-tracking-wide);
      text-transform: uppercase;
      color: var(--ds-ink-muted);
      margin-bottom: var(--ds-space-2);
    }
    .card-title {
      font-size: var(--ds-text-xl);
      font-weight: var(--ds-weight-black);
      color: var(--ds-ink);
      letter-spacing: var(--ds-tracking-tight);
    }

    .error-box {
      display: none;
      align-items: center;
      gap: var(--ds-space-2);
      padding: var(--ds-space-3) var(--ds-space-4);
      border-radius: var(--ds-radius-md);
      background: var(--ds-danger-soft);
      border: 1px solid #fecaca;
      color: var(--ds-danger);
      font-size: var(--ds-text-sm);
      font-weight: var(--ds-weight-semi);
      margin-bottom: var(--ds-space-4);
    }
    .error-box.is-visible { display: flex; }
    .error-box-icon { display: inline-flex; align-items: center; flex-shrink: 0; }

    .field { margin-bottom: var(--ds-space-4); }
    .field label {
      display: block;
      font-size: var(--ds-text-xs);
      font-weight: var(--ds-weight-bold);
      color: var(--ds-ink-muted);
      letter-spacing: var(--ds-tracking-wide);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--ds-ink-subtle); pointer-events: none;
      display: inline-flex; align-items: center; justify-content: center;
      transition: color var(--ds-duration-2) var(--ds-ease);
    }
    .input-wrap input {
      width: 100%;
      height: 46px;
      padding: 0 var(--ds-space-4) 0 44px;
      background: var(--ds-surface-alt);
      border: 1px solid var(--ds-line);
      border-radius: var(--ds-radius-md);
      font: inherit;
      font-size: var(--ds-text-base);
      color: var(--ds-ink);
      outline: none;
      transition: background var(--ds-duration-2) var(--ds-ease),
                  border-color var(--ds-duration-2) var(--ds-ease),
                  box-shadow var(--ds-duration-2) var(--ds-ease);
    }
    .input-wrap input::placeholder { color: var(--ds-ink-subtle); }
    .input-wrap input:hover { border-color: var(--ds-line-strong); }
    .input-wrap input:focus {
      background: #fff;
      border-color: #334155;
      box-shadow: 0 0 0 3px rgba(15,23,42,.08);
    }
    .input-wrap:focus-within .input-icon { color: #0f172a; }
    .input-wrap .input-ico-svg { width: 18px; height: 18px; display: block; }

    .btn-login {
      width: 100%;
      height: 48px;
      margin-top: var(--ds-space-2);
      border: none;
      border-radius: var(--ds-radius-md);
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      font: inherit;
      font-weight: var(--ds-weight-bold);
      font-size: var(--ds-text-base);
      letter-spacing: .01em;
      cursor: pointer;
      transition: transform var(--ds-duration-2) var(--ds-ease),
                  box-shadow var(--ds-duration-2) var(--ds-ease),
                  background var(--ds-duration-2) var(--ds-ease),
                  opacity var(--ds-duration-2) var(--ds-ease);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #1e293b, var(--ds-brand));
      box-shadow: 0 12px 26px rgba(15,23,42,.4);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .7; cursor: not-allowed; transform: none; }
    .btn-login-arrow {
      transition: transform var(--ds-duration-2) var(--ds-ease);
      display: inline-flex; align-items: center;
    }
    .btn-login-arrow svg { width: 18px; height: 18px; display: block; }
    .btn-login:hover .btn-login-arrow { transform: translateX(3px); }

    .card-hint {
      text-align: center;
      font-size: var(--ds-text-xs);
      color: var(--ds-ink-muted);
      margin-top: var(--ds-space-4);
      line-height: 1.5;
    }
    .card-hint strong { color: var(--ds-ink); font-weight: var(--ds-weight-semi); }
    .card-hint a {
      color: var(--ds-accent-600);
      text-decoration: none;
      font-weight: var(--ds-weight-semi);
    }
    .card-hint a:hover { text-decoration: underline; }

    .shell-foot {
      text-align: center;
      margin-top: var(--ds-space-5);
      font-size: 11px;
      color: rgba(255,255,255,.45);
      letter-spacing: var(--ds-tracking-wide);
      text-transform: uppercase;
      font-weight: var(--ds-weight-bold);
    }

    @media (max-width: 480px) {
      .bg-a { display: none; }
      .brand-a { width: 72px; height: 72px; }
      .brand-a img { width: 48px; height: 48px; }
      .brand-title { font-size: var(--ds-text-2xl); }
      .card { padding: var(--ds-space-5) var(--ds-space-5) var(--ds-space-4); }
    }
  </style>
</head>
<body>

  <div class="bg-a one"><img src="/assets/img/astro-a.png" alt=""></div>
  <div class="bg-a two"><img src="/assets/img/astro-a.png" alt=""></div>

  <div class="shell">

    <div class="brand-hero">
      <div class="brand-a">
        <img src="/assets/img/astro-a.png" alt="Astro Vistorias">
      </div>
      <div class="brand-title">Astro Vistorias</div>
      <div class="brand-sub">Sistema integrado de gestão da rede</div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-eyebrow">Área restrita</div>
        <div class="card-title">Acessar o sistema</div>
      </div>

      <div class="error-box" id="errorBox">
        <span class="error-box-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        </span>
        <span id="errorText"></span>
      </div>

      <form method="post" action="/login" autocomplete="on" id="loginForm">
        <div class="field">
          <label for="email">E-mail corporativo</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg class="input-ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="voce@astrovistorias.com.br"
              autocomplete="username"
              required
            />
          </div>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg class="input-ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          <span>Entrar no sistema</span>
          <span class="btn-login-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
          </span>
        </button>
      </form>

      <p class="card-hint">
        Acesso restrito a colaboradores <strong>@astrovistorias.com.br</strong><br>
        <a href="/manual" target="_blank" class="hint-link">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M4 4v16a2 2 0 0 1 2-2h14V2H6a2 2 0 0 0-2 2z"/><path d="M20 18v4H6a2 2 0 0 1-2-2"/></svg>Como usar o sistema
        </a>
      </p>
    </div>

    <div class="shell-foot">Astro Vistorias · v2.1 · Painel Astro</div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const erro   = params.get("erro");
    const box    = document.getElementById("errorBox");
    const txt    = document.getElementById("errorText");

    const mensagens = {
      dominio:     "Acesso permitido apenas para e-mails @astrovistorias.com.br.",
      credenciais: "E-mail ou senha inválidos. Verifique e tente novamente.",
      bloqueado:   "Muitas tentativas. Aguarde alguns minutos e tente novamente.",
    };
    if (mensagens[erro]) {
      txt.textContent = mensagens[erro];
      box.classList.add("is-visible");
    }

    // Foca no primeiro campo vazio
    const emailEl = document.getElementById("email");
    const pwEl    = document.getElementById("password");
    if (!emailEl.value) emailEl.focus();
    else pwEl.focus();

    // Loading state no submit
    document.getElementById("loginForm").addEventListener("submit", () => {
      const btn = document.getElementById("btnLogin");
      btn.disabled = true;
      btn.innerHTML = '<span>Validando…</span>';
    });
  </script>
</body>
</html>
