<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Vistorias — Ativar conta</title>
  <link rel="icon" type="image/png" href="/assets/img/astro-a.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/design-system.css">
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--ds-space-5);
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #334155 100%);
      font-family: var(--ds-font-sans);
      color: var(--ds-ink);
      position: relative;
      overflow: hidden;
    }
    body::before, body::after {
      content: ""; position: absolute; pointer-events: none;
      border-radius: 50%; filter: blur(80px); opacity: .4;
    }
    body::before { width: 520px; height: 520px; background: #0e7490; top: -120px; right: -120px; }
    body::after  { width: 420px; height: 420px; background: #2563eb; bottom: -120px; left: -120px; opacity: .25; }

    .shell { position: relative; width: 100%; max-width: 440px; z-index: 1; }

    .brand-hero { text-align: center; margin-bottom: var(--ds-space-6); }
    .brand-a {
      display: inline-flex; width: 88px; height: 88px;
      background: #fff; border-radius: var(--ds-radius-xl);
      align-items: center; justify-content: center;
      margin-bottom: var(--ds-space-4);
      box-shadow: 0 10px 30px rgba(14,116,144,.4), inset 0 0 0 1px rgba(255,255,255,.2);
    }
    .brand-a img { width: 60px; height: 60px; }
    .brand-title {
      font-size: var(--ds-text-3xl); font-weight: var(--ds-weight-black);
      color: #fff; letter-spacing: var(--ds-tracking-tight); line-height: 1.1;
    }
    .brand-sub {
      font-size: var(--ds-text-sm); color: rgba(255,255,255,.65);
      margin-top: var(--ds-space-2); font-weight: var(--ds-weight-medium);
    }

    .card {
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(12px);
      border-radius: var(--ds-radius-xl);
      padding: var(--ds-space-6) var(--ds-space-6) var(--ds-space-5);
      box-shadow: 0 20px 50px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.05);
    }

    .card-head { text-align: center; margin-bottom: var(--ds-space-5); }
    .card-eyebrow {
      font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      letter-spacing: var(--ds-tracking-wide); text-transform: uppercase;
      color: #0e7490; margin-bottom: var(--ds-space-2);
    }
    .card-title {
      font-size: var(--ds-text-xl); font-weight: var(--ds-weight-black);
      color: var(--ds-ink); letter-spacing: var(--ds-tracking-tight);
    }
    .card-welcome {
      font-size: var(--ds-text-sm); color: var(--ds-ink-muted);
      margin-top: var(--ds-space-2); line-height: 1.5;
    }
    .card-welcome strong { color: var(--ds-ink); font-weight: var(--ds-weight-bold); }

    .alert-box {
      padding: var(--ds-space-3) var(--ds-space-4);
      border-radius: var(--ds-radius-md);
      font-size: var(--ds-text-sm); font-weight: var(--ds-weight-semi);
      margin-bottom: var(--ds-space-4);
    }
    .alert-error { background: var(--ds-danger-soft); border: 1px solid #fecaca; color: var(--ds-danger); }
    .alert-warn  { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

    .field { margin-bottom: var(--ds-space-4); }
    .field label {
      display: block; font-size: var(--ds-text-xs); font-weight: var(--ds-weight-bold);
      color: var(--ds-ink-muted); letter-spacing: var(--ds-tracking-wide);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .input-wrap input {
      width: 100%; height: 46px; padding: 0 var(--ds-space-4);
      background: var(--ds-surface-alt); border: 1px solid var(--ds-line);
      border-radius: var(--ds-radius-md); font: inherit;
      font-size: var(--ds-text-base); color: var(--ds-ink); outline: none;
      transition: border-color var(--ds-duration-2) var(--ds-ease), box-shadow var(--ds-duration-2) var(--ds-ease);
      box-sizing: border-box;
    }
    .input-wrap input:focus {
      background: #fff; border-color: #0e7490;
      box-shadow: 0 0 0 3px rgba(14,116,144,.15);
    }
    .input-wrap input:disabled {
      background: #f1f5f9; color: #64748b; cursor: not-allowed;
    }

    .field-hint {
      font-size: var(--ds-text-xs); color: var(--ds-ink-subtle);
      margin-top: 6px;
    }

    .btn-primary {
      width: 100%; height: 48px; margin-top: var(--ds-space-2);
      border: none; border-radius: var(--ds-radius-md);
      background: linear-gradient(135deg, #0e7490, #0369a1);
      color: #fff; font: inherit; font-weight: var(--ds-weight-bold);
      font-size: var(--ds-text-base); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: transform var(--ds-duration-2) var(--ds-ease), box-shadow var(--ds-duration-2) var(--ds-ease), opacity var(--ds-duration-2) var(--ds-ease);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(14,116,144,.35); }
    .btn-primary:disabled { opacity: .7; cursor: not-allowed; transform: none; }

    .shell-foot {
      text-align: center; margin-top: var(--ds-space-5);
      font-size: 11px; color: rgba(255,255,255,.45);
      letter-spacing: var(--ds-tracking-wide); text-transform: uppercase;
      font-weight: var(--ds-weight-bold);
    }
    .center { text-align: center; }
    .link-login {
      display: inline-block; margin-top: var(--ds-space-3);
      color: #0e7490; text-decoration: none; font-weight: var(--ds-weight-semi);
      font-size: var(--ds-text-sm);
    }
    .link-login:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand-hero">
      <div class="brand-a"><img src="/assets/img/astro-a.png" alt="Astro Vistorias"></div>
      <div class="brand-title">Astro Vistorias</div>
      <div class="brand-sub">Ativar sua conta</div>
    </div>

    <div class="card">
      <div id="screenLoading" class="center" style="padding:40px 0;color:var(--ds-ink-muted)">
        Validando convite…
      </div>

      <div id="screenInvalid" style="display:none">
        <div class="card-head">
          <div class="card-eyebrow" style="color:var(--ds-danger)">Convite inválido</div>
          <div class="card-title">Não foi possível ativar</div>
        </div>
        <div class="alert-box alert-error" id="invalidMsg">—</div>
        <p class="center"><a href="/login" class="link-login">Voltar ao login</a></p>
      </div>

      <div id="screenForm" style="display:none">
        <div class="card-head">
          <div class="card-eyebrow">Bem-vindo</div>
          <div class="card-title">Crie sua senha</div>
          <div class="card-welcome">
            Olá, <strong id="welcomeName">—</strong>! Defina uma senha para acessar o painel Astro.
          </div>
        </div>

        <div class="alert-box alert-error" id="formError" style="display:none"></div>

        <form id="ativarForm" autocomplete="off">
          <div class="field">
            <label for="fEmail">E-mail</label>
            <div class="input-wrap">
              <input type="email" id="fEmail" disabled>
            </div>
          </div>
          <div class="field">
            <label for="fSenha">Nova senha</label>
            <div class="input-wrap">
              <input type="password" id="fSenha" placeholder="••••••••" autocomplete="new-password" required>
            </div>
            <div class="field-hint">Mínimo 8 caracteres.</div>
          </div>
          <div class="field">
            <label for="fSenha2">Confirmar senha</label>
            <div class="input-wrap">
              <input type="password" id="fSenha2" placeholder="••••••••" autocomplete="new-password" required>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="btnAtivar">
            <span>Ativar conta e entrar</span>
            <span>→</span>
          </button>
        </form>
      </div>
    </div>

    <div class="shell-foot">Astro Vistorias · v2.1 · Painel Astro</div>
  </div>

  <script>
    const token = window.location.pathname.split("/").pop();

    function show(screenId) {
      ["screenLoading", "screenInvalid", "screenForm"].forEach(id => {
        document.getElementById(id).style.display = (id === screenId) ? "" : "none";
      });
    }

    async function carregar() {
      try {
        const r = await fetch(`/api/ativar/${encodeURIComponent(token)}`, { cache: "no-store" });
        const j = await r.json();
        if (!r.ok || !j.success) {
          document.getElementById("invalidMsg").textContent = j.error || "Convite inválido.";
          show("screenInvalid");
          return;
        }
        document.getElementById("fEmail").value  = j.email || "";
        document.getElementById("welcomeName").textContent = (j.name || "").split(" ")[0] || j.email;
        show("screenForm");
        setTimeout(() => document.getElementById("fSenha").focus(), 80);
      } catch (e) {
        document.getElementById("invalidMsg").textContent = "Erro de rede: " + e.message;
        show("screenInvalid");
      }
    }

    function showError(msg) {
      const box = document.getElementById("formError");
      box.textContent = msg;
      box.style.display = "block";
    }
    function hideError() { document.getElementById("formError").style.display = "none"; }

    document.getElementById("ativarForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      hideError();
      const senha  = document.getElementById("fSenha").value;
      const senha2 = document.getElementById("fSenha2").value;
      if (senha.length < 8) { showError("Senha deve ter pelo menos 8 caracteres."); return; }
      if (senha !== senha2)  { showError("As senhas não conferem."); return; }

      const btn = document.getElementById("btnAtivar");
      btn.disabled = true;
      btn.innerHTML = "<span>Ativando…</span>";
      try {
        const r = await fetch(`/api/ativar/${encodeURIComponent(token)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: senha }),
        });
        const j = await r.json();
        if (!r.ok || !j.success) {
          showError(j.error || "Erro ao ativar.");
          btn.disabled = false;
          btn.innerHTML = "<span>Ativar conta e entrar</span><span>→</span>";
          return;
        }
        window.location.href = "/";
      } catch (e) {
        showError("Erro de rede: " + e.message);
        btn.disabled = false;
        btn.innerHTML = "<span>Ativar conta e entrar</span><span>→</span>";
      }
    });

    carregar();
  </script>
</body>
</html>
